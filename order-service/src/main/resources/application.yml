spring:
  application:
    name: order-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:mock-pawapay}
  codec:
    # Limit in-memory body size — prevents OOM from oversized webhook/API payloads
    max-in-memory-size: 256KB

  # Database Configuration
  r2dbc:
    url: r2dbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:inventory}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    pool:
      initial-size: 10
      max-size: 20
      max-idle-time: 30m
      validation-query: SELECT 1

  # Flyway Configuration (JDBC - uses common module migrations)
  flyway:
    enabled: true
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:inventory}
    user: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    locations: classpath:db/migration
    baseline-on-migrate: true

# Server Configuration
server:
  port: ${SERVER_PORT:8082}
  netty:
    connection-timeout: 30s
  # Limit request body size — prevents OOM from oversized webhook/API payloads
  max-http-request-header-size: 8KB

# Logging
logging:
  level:
    root: INFO
    com.quickcommerce: INFO
    org.springframework.r2dbc: INFO
  file:
    name: ./logs/order-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 100MB
      file-name-pattern: ${LOG_FILE}.%d{yyyy-MM-dd}.%i.gz

# External Services
client:
  product-service:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8081}
  inventory-service:
    url: ${INVENTORY_SERVICE_URL:http://localhost:8081}

# Order Business Config
order:
  delivery-fee-zmw: ${ORDER_DELIVERY_FEE:15.00}
  payment-timeout-minutes: ${ORDER_PAYMENT_TIMEOUT_MINUTES:15}
  cleanup-interval-ms: ${ORDER_CLEANUP_INTERVAL_MS:60000}

# ─── Phone Validation Config ──────────────────────────────────────────────────
# Set ACCEPT_INDIAN_PHONE_NUMBERS=true while testing from India (dev, staging, AWS prod).
# Flip to false (or remove the env var) once the app goes live in Zambia only.
phone:
  accept-indian-numbers: ${ACCEPT_INDIAN_PHONE_NUMBERS:true}

# ─── Payment Gateway Config ───────────────────────────────────────────────────
# Controls which gateway handles NEW payment initiations.
# Existing payment_attempts retain their gateway_used value so the failsafe
# scheduler can still check status via the correct provider after a switch.
#
# Values: PAWAPAY | AIRTEL_DIRECT
#
# Set both SPRING_PROFILES_ACTIVE and ACTIVE_PAYMENT_GATEWAY together:
#   mock-airtel  + AIRTEL_DIRECT  → Airtel mock (default)
#   airtel       + AIRTEL_DIRECT  → Airtel real
#   mock-pawapay + PAWAPAY        → PawaPay mock
#   pawapay      + PAWAPAY        → PawaPay real
payment:
  active-gateway: ${ACTIVE_PAYMENT_GATEWAY:PAWAPAY}
  # Failsafe scheduler: polls provider for stuck INITIATED attempts.
  # Production values below; overridden to fast values in application-dev.yml.
  failsafe-interval-ms: ${PAYMENT_FAILSAFE_INTERVAL_MS:55000}     # 55s in prod
  failsafe-cutoff-seconds: ${PAYMENT_FAILSAFE_CUTOFF_SECONDS:60}  # attempts idle >60s

# ─── PawaPay Config ───────────────────────────────────────────────────────────
# Active when Spring profile includes "pawapay"
# Dev/test: use "mock-pawapay" profile — no real credentials needed
pawapay:
  base-url: ${PAWAPAY_BASE_URL:https://api.sandbox.pawapay.io}
  api-key: ${PAWAPAY_API_KEY:mock-pawapay-key}
  # PawaPay webhook URL — must be publicly reachable HTTPS in staging/prod
  callback-url: ${PAWAPAY_CALLBACK_URL:http://localhost:8082/api/v1/webhooks/pawapay}

# ─── Airtel Money Config ──────────────────────────────────────────────────────
# Active when Spring profile includes "airtel" (staging/prod)
# Switch from mock-airtel to airtel once sandbox credentials are available
airtel:
  base-url: ${AIRTEL_BASE_URL:https://openapiuat.airtel.africa}
  client-id: ${AIRTEL_CLIENT_ID:mock-id}
  client-secret: ${AIRTEL_CLIENT_SECRET:mock-secret}
  callback-url: ${AIRTEL_CALLBACK_URL:http://localhost:8082/api/v1/webhooks/airtel}
  country: ${AIRTEL_COUNTRY:ZM}
  currency: ${AIRTEL_CURRENCY:ZMW}
  token-refresh-interval-ms: ${AIRTEL_TOKEN_REFRESH_MS:2700000}   # 45 minutes

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      product-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

  retry:
    instances:
      product-service:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - org.springframework.web.reactive.function.client.WebClientRequestException

  ratelimiter:
    instances:
      # 5 order-creation requests per 60s (global)
      order-creation:
        limit-for-period: 5
        limit-refresh-period: 60s
        timeout-duration: 0s
      # 3 pay-initiation requests per 60s — prevents STK push spam
      pay-initiation:
        limit-for-period: 3
        limit-refresh-period: 60s
        timeout-duration: 0s

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
